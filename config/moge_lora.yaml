# CAPA config: MoGe-2 + LoRA
model_name: moge
ckpt_path: Ruicheng/moge-2-vitl-normal

tuning_mode: lora
lora_rank: 16
lora_alpha: 32
lora_target_modules: ["qkv"]

n_steps: 100
lr: 3.0e-4
lr_scheduler: null
gradient_clip_norm: 1.0
max_bs_optimize: 6
max_bs_infer: 16
pct_random_key_frame: 10

alignment:
  n_points: 15000
  seed: 47
