# CAPA config: MoGe-2 + VPT
model_name: moge
ckpt_path: Ruicheng/moge-2-vitl-normal

tuning_mode: vpt
vpt_token_len: 64
vpt_init_method: load_assets/vpt_init_tokens/moge_vpt-64.pt

n_steps: 100
lr: 2.0e-4
lr_scheduler:
  type: LinearLR
  kwargs:
    start_factor: 1.0
    end_factor: 0.1
    total_iters: 150
gradient_clip_norm: 1.0
max_bs_optimize: 6
max_bs_infer: 16
pct_random_key_frame: 10

alignment:
  n_points: 15000
  seed: 47
