# CAPA config: UniDepth-v2 + LoRA
model_name: unidepth
ckpt_path: lpiccinelli/unidepth-v2-vitl14

tuning_mode: lora
lora_rank: 16
lora_alpha: 32
lora_target_modules: ["qkv"]

n_steps: 100
lr: 3.0e-4
lr_scheduler: null
gradient_clip_norm: 1.0
max_bs_optimize: 8
max_bs_infer: 16
pct_random_key_frame: 10
max_nan_retries: 3

alignment:
  n_points: 15000
  seed: 47
