# CAPA config: UniDepth-v2 + VPT
model_name: unidepth
ckpt_path: lpiccinelli/unidepth-v2-vitl14

tuning_mode: vpt
vpt_token_len: 96
vpt_init_method: load_assets/vpt_init_tokens/unidepth_vpt-96.pt

n_steps: 100
lr: 2.0e-4
lr_scheduler:
  type: LinearLR
  kwargs:
    start_factor: 1.0
    end_factor: 0.1
    total_iters: 150
gradient_clip_norm: 1.0
max_bs_optimize: 8
max_bs_infer: 16
pct_random_key_frame: 20
max_nan_retries: 3

alignment:
  n_points: 15000
  seed: 47
