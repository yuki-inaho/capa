# CAPA config: VGGT + VPT
model_name: vggt
ckpt_path: facebook/VGGT-1B

tuning_mode: vpt
vpt_token_len: 16
vpt_init_method: load_assets/vpt_init_tokens/vggt_vpt-16.pt

n_steps: 100
lr: 2.0e-4
lr_scheduler: null
gradient_clip_norm: 1.0
max_bs_optimize: 10
max_bs_infer: null
pct_random_key_frame: 10

alignment:
  n_points: 12000
  seed: 47
